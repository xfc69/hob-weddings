<!DOCTYPE html>
<html lang="{{ site.Language.LanguageCode }}" dir="{{ or site.Language.LanguageDirection `ltr` }}">
    <head>
        {{ partial "head.html" . }}
    </head>
    <body>
        <header>
            {{ partial "header.html" . }}
        </header>

        <main>
            {{ block "main" . }}{{ end }}
        </main>

        <div class="footer-line">
            <hr>
        </div>

        <footer>
            {{ partial "footer.html" . }}
        </footer>
    </body>
</html>
